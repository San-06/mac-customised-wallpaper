<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Motivation Wallpaper</title>
  <link rel="stylesheet" href="style.css">
  <!-- Google Fonts: Montserrat -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="wallpaper-container">
    
    <!-- Top Section Overlay: 80px Live Clock (Masks Static Clock) -->
    <header class="clock-section">
      <h1 id="live-clock" class="time-display">0:00:00</h1>
    </header>

    <!-- Focus Box Overlay (Masks Static Focus Box) -->
    <div class="focus-mode-box">
      <div class="focus-header">
        <img src="ChatGPT Image May 31, 2026, 11_27_03 AM.png" alt="Sparkle" class="sparkle-icon">
        <span> FOCUS MODE</span>
      </div>
      <div id="countdown" class="countdown-display">1/45</div>
      
      <!-- Live Progress Bar -->
      <div class="progress-bar-container">
        <div id="progress-bar" class="progress-bar-fill"></div>
      </div>

      <div id="live-date" class="date-display">31 May 2026 at 11:45 AM</div>
    </div>

  </div>
  <script src="app.js"></script>
</body>
</html>
